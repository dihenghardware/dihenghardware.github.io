<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ディヘン金型 | 精密ピンゲージ</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
        :root{--main:#003366;--blue:#0066cc;--gray:#f5f7fa;}
        body{background:#fff;color:#333;line-height:1.7;position:relative;padding-bottom:80px;}
        
        .fixed-service{position:fixed;right:20px;bottom:20px;z-index:99999999;}
        .service-btn{background:#003366;color:#fff;border:none;border-radius:50px;width:60px;height:60px;font-size:12px;cursor:pointer;box-shadow:0 4px 15px #00000030;display:flex;align-items:center;justify-content:center;}
        .service-box{display:none;position:absolute;right:0;bottom:70px;width:300px;background:#fff;border-radius:10px;box-shadow:0 5px 20px #00000020;padding:20px;}
        .service-box h4{margin-bottom:10px;color:#003366;}
        .service-input{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;margin-bottom:10px;}
        .service-submit{background:#003366;color:#fff;border:none;padding:10px;border-radius:6px;width:100%;cursor:pointer;}
        .close-service{text-align:right;font-size:12px;color:#999;cursor:pointer;}

        .top-lang{background:#f8f8f8;text-align:right;padding:10px 20px;}
        .top-lang a{color:#333;text-decoration:none;margin:0 8px;}
        .header{border-bottom:1px solid #eee;}
        .container{max-width:1200px;margin:auto;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;}
        .logo img{height:55px;}
        .banner{background:linear-gradient(rgba(0,51,102,0.85),rgba(0,51,102,0.85)),url(https://raw.githubusercontent.com/dihenghardware/dihenghardware.github.io/main/pin001.png);background-size:cover;color:#fff;text-align:center;padding:90px 20px;}
        .wrap{max-width:1200px;margin:auto;padding:60px 20px;}
        footer{background:var(--main);color:#fff;text-align:center;padding:25px 0;}
    </style>
</head>
<body>

<div class="top-lang">
    <a href="index.html">中文</a>
    <a href="en.html">English</a>
    <a href="jp.html" class="active">日本語</a>
</div>

<div class="header"><div class="container"><div class="logo"><img src="https://raw.githubusercontent.com/dihenghardware/dihenghardware.github.io/main/logo.png"></div><div class="nav"><a href="#home">ホーム</a></div></div></div>
<section class="banner"><h1>ディヘン精密ピンゲージ</h1></section>
<div class="wrap"><h2>製品紹介</h2></div>
<footer>© 2026 ディヘン金型</footer>

<!-- オンラインサポート -->
<div class="fixed-service">
    <div class="service-box" id="serviceBox">
        <div class="close-service" onclick="toggleService()">閉じる ×</div>
        <h4>オンラインサポート</h4>
        <input class="service-input" placeholder="お名前・連絡先">
        <button class="service-submit" onclick="alert('送信しました！')">送信</button>
    </div>
    <button class="service-btn" onclick="toggleService()">オンラ<br>イン</button>
</div>

<script>function toggleService(){var b=document.getElementById("serviceBox");b.style.display=b.style.display=="block"?"none":"block";}</script>

</body>
</html>
