<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diheng Hardware | Precision Pin Gauge</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
        :root{--main:#003366;--blue:#0066cc;--gray:#f5f7fa;}
        body{background:#fff;color:#333;line-height:1.7;position:relative;padding-bottom:80px;}
        
        .fixed-service{position:fixed;right:20px;bottom:20px;z-index:99999999;}
        .service-btn{background:#003366;color:#fff;border:none;border-radius:50px;width:60px;height:60px;font-size:12px;cursor:pointer;box-shadow:0 4px 15px #00000030;display:flex;align-items:center;justify-content:center;}
        .service-box{display:none;position:absolute;right:0;bottom:70px;width:300px;background:#fff;border-radius:10px;box-shadow:0 5px 20px #00000020;padding:20px;}
        .service-box h4{margin-bottom:10px;color:#003366;}
        .service-box p{font-size:14px;color:#666;margin-bottom:10px;}
        .service-input{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;margin-bottom:10px;}
        .service-submit{background:#003366;color:#fff;border:none;padding:10px;border-radius:6px;width:100%;cursor:pointer;}
        .close-service{text-align:right;font-size:12px;color:#999;cursor:pointer;}

        .top-lang{background:#f8f8f8;text-align:right;padding:10px 20px;font-size:14px;}
        .top-lang a{color:#333;text-decoration:none;margin:0 8px;}
        .top-lang a.active{color:var(--blue);font-weight:bold;}
        .header{border-bottom:1px solid #eee;}
        .container{max-width:1200px;margin:auto;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;}
        .logo img{height:55px;}
        .nav a{text-decoration:none;color:#333;margin:0 15px;font-size:15px;}
        .banner{background:linear-gradient(rgba(0,51,102,0.85),rgba(0,51,102,0.85)),url(https://raw.githubusercontent.com/dihenghardware/dihenghardware.github.io/main/pin001.png);background-size:cover;background-position:center;color:#fff;text-align:center;padding:90px 20px;}
        .wrap{max-width:1200px;margin:auto;padding:60px 20px;}
        h2{text-align:center;color:var(--main);}
        .about{background:var(--gray);padding:40px;border-radius:8px;}
        .product-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:30px;}
        .product-card{border:1px solid #eee;border-radius:8px;overflow:hidden;}
        .product-card img{width:100%;height:200px;object-fit:cover;}
        .product-info{padding:20px;}
        footer{background:var(--main);color:#fff;text-align:center;padding:25px 0;}
    </style>
</head>
<body>

<div class="top-lang">
    <a href="index.html">中文</a>
    <a href="en.html" class="active">English</a>
    <a href="jp.html">日本語</a>
</div>

<div class="header">
    <div class="container">
        <div class="logo"><img src="https://raw.githubusercontent.com/dihenghardware/dihenghardware.github.io/main/logo.png"></div>
        <div class="nav">
            <a href="#home">Home</a><a href="#about">About</a><a href="#product">Products</a><a href="#contact">Contact</a>
        </div>
    </div>
</div>

<section class="banner" id="home">
    <h1>Diheng Hardware Mold Accessories</h1>
    <p>Precision Pin Gauge Manufacturer</p>
</section>

<div class="wrap">
    <section class="about" id="about"><h2>About Us</h2><p>Professional pin gauge factory in Dongguan...</p></section>
    <section id="product"><h2>Products</h2><div class="product-grid"><div class="product-card"><img src="https://raw.githubusercontent.com/dihenghardware/dihenghardware.github.io/main/pin001.png"><div class="product-info"><h3>Carbide Pin Gauge</h3></div></div></div></section>
</div>

<footer>© 2026 Diheng Hardware All Rights Reserved</footer>

<!-- STABLE LIVE CHAT -->
<div class="fixed-service">
    <div class="service-box" id="serviceBox">
        <div class="close-service" onclick="toggleService()">Close ×</div>
        <h4>Live Support</h4>
        <p>Inquiry price, custom, wholesale</p>
        <input class="service-input" placeholder="Name / Phone / WhatsApp">
        <input class="service-input" placeholder="Your request">
        <button class="service-submit" onclick="alert('Message sent! We will reply soon.')">Send</button>
    </div>
    <button class="service-btn" onclick="toggleService()">Live<br>Chat</button>
</div>

<script>function toggleService(){var b=document.getElementById("serviceBox");b.style.display=b.style.display=="block"?"none":"block";}</script>

</body>
</html>
