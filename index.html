<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帝恒五金模具配件廠 | 精密針規專業製造商</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,"Microsoft YaHei",sans-serif;}
        :root{--main:#003366;--blue:#0066cc;--gray:#f5f7fa;}
        body{background:#fff;color:#333;line-height:1.7;position:relative;padding-bottom:80px;}
        
        /* 固定客服按钮，永远不被遮挡 */
        .fixed-service{position:fixed;right:20px;bottom:20px;z-index:99999999;}
        .service-btn{background:#003366;color:#fff;border:none;border-radius:50px;width:60px;height:60px;font-size:12px;cursor:pointer;box-shadow:0 4px 15px #00000030;display:flex;align-items:center;justify-content:center;flex-direction:column;}
        .service-box{display:none;position:absolute;right:0;bottom:70px;width:300px;background:#fff;border-radius:10px;box-shadow:0 5px 20px #00000020;padding:20px;}
        .service-box h4{margin-bottom:10px;color:#003366;}
        .service-box p{font-size:14px;color:#666;margin-bottom:10px;}
        .service-input{width:100%;padding:10px;border:1px solid #ddd;border-radius:6px;margin-bottom:10px;}
        .service-submit{background:#003366;color:#fff;border:none;padding:10px;border-radius:6px;width:100%;cursor:pointer;}
        .close-service{text-align:right;font-size:12px;color:#999;cursor:pointer;}

        .top-lang{background:#f8f8f8;text-align:right;padding:10px 20px;font-size:14px;}
        .top-lang a{color:#333;text-decoration:none;margin:0 8px;}
        .top-lang a.active{color:var(--blue);font-weight:bold;}
        .header{border-bottom:1px solid #eee;}
        .container{max-width:1200px;margin:auto;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;}
        .logo img{height:55px;}
        .nav a{text-decoration:none;color:#333;margin:0 15px;font-size:15px;}
        .nav a:hover{color:var(--blue);}
        .banner{background:linear-gradient(rgba(0,51,102,0.85),rgba(0,51,102,0.85)),url(https://raw.githubusercontent.com/dihenghardware/dihenghardware.github.io/main/pin001.png);background-size:cover;background-position:center;color:#fff;text-align:center;padding:90px 20px;}
        .banner h1{font-size:36px;margin-bottom:12px;}
        .wrap{max-width:1200px;margin:auto;padding:60px 20px;}
        h2{text-align:center;color:var(--main);font-size:28px;margin-bottom:40px;}
        .about{background:var(--gray);padding:40px;border-radius:8px;margin-bottom:60px;}
        .product-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:30px;margin-bottom:60px;}
        .product-card{border:1px solid #eee;border-radius:8px;overflow:hidden;transition:0.3s;}
        .product-card:hover{transform:translateY(-5px);box-shadow:0 8px 20px #00000015;}
        .product-card img{width:100%;height:200px;object-fit:cover;}
        .product-info{padding:20px;}
        .news{background:var(--gray);padding:40px;border-radius:8px;margin-bottom:60px;}
        .news-item{padding:12px 0;border-bottom:1px solid #ddd;}
        .contact{background:var(--gray);padding:40px;border-radius:8px;margin-bottom:60px;}
        .row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:15px;}
        .contact input,.contact textarea{width:100%;padding:12px;border:1px solid #ddd;border-radius:4px;}
        .contact textarea{height:140px;}
        .contact button{background:var(--main);color:#fff;border:none;padding:12px 35px;border-radius:4px;cursor:pointer;}
        footer{background:var(--main);color:#fff;text-align:center;padding:25px 0;font-size:14px;}
    </style>
</head>
<body>

<div class="top-lang">
    <a href="index.html" class="active">中文</a>
    <a href="en.html">English</a>
    <a href="jp.html">日本語</a>
</div>

<div class="header">
    <div class="container">
        <div class="logo">
            <img src="https://raw.githubusercontent.com/dihenghardware/dihenghardware.github.io/main/logo.png" alt="LOGO">
        </div>
        <div class="nav">
            <a href="#home">首頁</a>
            <a href="#about">公司介紹</a>
            <a href="#product">產品中心</a>
            <a href="#news">最新消息</a>
            <a href="#message">客戶留言</a>
            <a href="#contact">聯絡我們</a>
        </div>
    </div>
</div>

<section class="banner" id="home">
    <h1>東莞長安帝恒五金模具配件廠</h1>
    <p>專業精密針規製造｜公差±0.001mm｜各材質非標訂製</p>
</section>

<div class="wrap">
    <section class="about" id="about">
        <h2>公司介紹</h2>
        <p>東莞長安帝恒五金模具配件廠，位於廣東省東莞市長安鎮，是專業研發、生產、銷售精密針規、模具配件的實力廠家。</p>
    </section>

    <section id="product">
        <h2>產品中心</h2>
        <div class="product-grid">
            <div class="product-card"><img src="https://raw.githubusercontent.com/dihenghardware/dihenghardware.github.io/main/pin001.png"><div class="product-info"><h3>硬質合金針規</h3></div></div>
            <div class="product-card"><img src="https://raw.githubusercontent.com/dihenghardware/dihenghardware.github.io/main/pin002.png"><div class="product-info"><h3>高速鋼針規</h3></div></div>
            <div class="product-card"><img src="https://raw.githubusercontent.com/dihenghardware/dihenghardware.github.io/main/pin003.png"><div class="product-info"><h3>陶瓷針規</h3></div></div>
            <div class="product-card"><img src="https://raw.githubusercontent.com/dihenghardware/dihenghardware.github.io/main/pin004.png"><div class="product-info"><h3>非標訂製針規</h3></div></div>
        </div>
    </section>

    <section class="news" id="news">
        <h2>最新消息</h2>
        <div class="news-item">全系列精密針規開放批量訂單</div>
        <div class="news-item">新增非標針規專業訂製服務</div>
    </section>

    <section class="contact" id="message">
        <h2>客戶留言</h2>
        <div class="row"><input placeholder="您的姓名"><input placeholder="聯絡電話"></div>
        <textarea placeholder="請輸入查詢內容"></textarea>
        <button>提交留言</button>
    </section>
</div>

<footer>© 2026 帝恒五金模具配件廠 版權所有</footer>

<!-- 永久穩定 在線客服 -->
<div class="fixed-service">
    <div class="service-box" id="serviceBox">
        <div class="close-service" onclick="toggleService()">關閉 ×</div>
        <h4>在線客服</h4>
        <p>歡迎諮詢針規報價、訂製、批發</p>
        <input class="service-input" placeholder="您的姓名/電話/WhatsApp">
        <input class="service-input" placeholder="您的需求">
        <button class="service-submit" onclick="alert('訊息已送出，我們將盡快回覆您！')">發送訊息</button>
    </div>
    <button class="service-btn" onclick="toggleService()">在線<br>客服</button>
</div>

<script>
function toggleService(){var b=document.getElementById("serviceBox");b.style.display=b.style.display=="block"?"none":"block";}
</script>

</body>
</html>
